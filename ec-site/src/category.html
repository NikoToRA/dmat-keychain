<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カテゴリ - DMAT STORE</title>
  <meta property="og:title" content="DMAT STORE - DMAT隊員・病院向けグッズ" />
  <meta property="og:description" content="DMATロゴ入りキーホルダー。3Dプリント製、NFC内蔵。" />
  <meta property="og:image" content="images/og-image.webp" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/analytics-config.js"></script>
  <script src="js/analytics.js" defer></script>
</head>
<body class="bg-gray-50">
  <header id="site-header" class="bg-white shadow-sm sticky top-0 z-40"></header>

  <main>
    <!-- カテゴリヒーロー -->
    <section id="category-hero" class="hero-gradient text-white py-12 sm:py-16">
      <div class="max-w-6xl mx-auto px-4 text-center">
        <h1 id="category-title" class="text-2xl sm:text-4xl font-bold mb-2"></h1>
        <p id="category-desc" class="text-gray-300"></p>
      </div>
    </section>

    <section class="max-w-6xl mx-auto px-4 py-10">
      <!-- パンくず -->
      <nav class="text-sm text-gray-500 mb-6">
        <a href="index.html" class="hover:text-dmat-navy transition-colors">トップ</a>
        <span class="mx-2">&gt;</span>
        <span id="breadcrumb-category"></span>
      </nav>

      <!-- ソートバー -->
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
        <p id="result-count" class="text-sm text-gray-500"></p>
        <div class="flex gap-2">
          <button onclick="sortSets('recommended')" class="sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-dmat-navy text-white" data-sort="recommended">おすすめ順</button>
          <button onclick="sortSets('price-asc')" class="sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200" data-sort="price-asc">価格が安い順</button>
          <button onclick="sortSets('price-desc')" class="sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200" data-sort="price-desc">価格が高い順</button>
        </div>
      </div>

      <!-- 商品グリッド -->
      <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

      <!-- カスタムビルダーへの誘導 -->
      <div class="mt-12 bg-white rounded-xl p-8 text-center shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold text-dmat-navy mb-2">お好みの組み合わせで注文</h3>
        <p class="text-sm text-gray-500 mb-4">カラーと付属品を自由に選んで、あなただけのキーホルダーを作れます</p>
        <a href="product.html?custom=true" class="inline-block bg-dmat-red text-white py-3 px-8 rounded-xl hover:bg-dmat-red-dark transition-colors font-medium">
          カスタムで注文する
        </a>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="bg-gray-900 text-gray-300"></footer>

  <script src="js/products.js"></script>
  <script src="js/shipping.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script>
    let currentCategoryId = 'all';
    let currentSort = 'recommended';

    function getCategorySets() {
      if (currentCategoryId === 'all') return [...RECOMMENDED_SETS];
      return RECOMMENDED_SETS.filter(s => s.category === currentCategoryId);
    }

    function sortSets(sortType) {
      currentSort = sortType;
      // ソートボタンのアクティブ状態を更新
      document.querySelectorAll('.sort-btn').forEach(btn => {
        if (btn.dataset.sort === sortType) {
          btn.className = 'sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-dmat-navy text-white';
        } else {
          btn.className = 'sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200';
        }
      });
      renderSets();
    }

    function renderSets() {
      let sets = getCategorySets();

      if (currentSort === 'price-asc') {
        sets.sort((a, b) => calculateSetPrice(a) - calculateSetPrice(b));
      } else if (currentSort === 'price-desc') {
        sets.sort((a, b) => calculateSetPrice(b) - calculateSetPrice(a));
      }

      const grid = document.getElementById('product-grid');
      const count = document.getElementById('result-count');
      grid.innerHTML = sets.map(s => createSetCard(s)).join('');
      count.textContent = sets.length + '件の商品';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      currentCategoryId = params.get('cat') || 'all';
      const category = CATEGORIES.find(c => c.id === currentCategoryId);

      const title = category ? category.name : 'すべての商品';
      const desc = category ? category.description : 'DMAT関連グッズをすべて表示';

      document.getElementById('category-title').textContent = title;
      document.getElementById('category-desc').textContent = desc;
      document.getElementById('breadcrumb-category').textContent = title;
      document.title = title + ' - DMAT STORE';

      renderSets();
    });
  </script>
</body>
</html>
