<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品詳細 - DMAT STORE</title>
  <meta property="og:title" content="DMAT STORE - DMAT隊員・病院向けグッズ" />
  <meta property="og:description" content="DMATロゴ入りキーホルダー。3Dプリント製、NFC内蔵。" />
  <meta property="og:image" content="images/og-image.webp" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/analytics-config.js"></script>
  <script src="js/analytics.js" defer></script>
</head>
<body class="bg-gray-50">
  <header id="site-header" class="bg-white shadow-sm sticky top-0 z-40"></header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="product-detail"></div>
  </main>

  <footer id="site-footer" class="bg-gray-900 text-gray-300"></footer>

  <script src="js/products.js"></script>
  <script src="js/shipping.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const setId = params.get('set');
      const isCustom = params.get('custom') === 'true';
      const container = document.getElementById('product-detail');

      if (setId) {
        renderSetMode(setId, container);
      } else {
        renderCustomMode(container);
      }
    });

    function renderSetMode(setId, container) {
      const set = RECOMMENDED_SETS.find(s => s.id === setId);
      if (!set) {
        container.innerHTML = '<p class="text-center text-gray-500 py-16">商品が見つかりません</p>';
        return;
      }

      const price = calculateSetPrice(set);
      const colorVariant = COLOR_VARIANTS.find(c => c.id === set.color);
      const image = colorVariant ? colorVariant.image : BASE_PRODUCT.image;
      const colorName = colorVariant ? colorVariant.name : '';
      const accNames = set.accessories.map(id => {
        const a = ACCESSORIES.find(acc => acc.id === id);
        return a ? a.name : '';
      }).filter(Boolean);

      document.title = set.name + ' - DMAT STORE';

      container.innerHTML = `
        <nav class="text-sm text-gray-500 mb-6">
          <a href="index.html" class="hover:text-dmat-navy transition-colors">トップ</a>
          <span class="mx-2">&gt;</span>
          <span>${set.name}</span>
        </nav>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
          <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center overflow-hidden border border-gray-100">
            <img src="${image}" alt="${set.name}"
                 class="w-full h-full object-cover"
                 onerror="this.parentElement.innerHTML='<div class=\\'flex flex-col items-center justify-center h-full\\' ><span class=\\'text-6xl mb-2\\'>&#128273;</span><span class=\\'text-gray-400\\'>DMAT キーホルダー</span></div>'" />
          </div>
          <div>
            ${set.badge ? `<span class="inline-block bg-dmat-red text-white text-xs font-bold px-3 py-1 rounded-full mb-4">${set.badge}</span>` : ''}
            <h1 class="text-2xl sm:text-3xl font-bold text-dmat-navy mb-3">${set.name}</h1>
            <p class="text-gray-600 mb-6 leading-relaxed">${set.description}</p>

            <div class="bg-gray-50 rounded-xl p-4 mb-6">
              <h3 class="text-sm font-bold text-gray-700 mb-3">セット内容</h3>
              <div class="space-y-2">
                <div class="flex items-center gap-2">
                  <span class="w-2 h-2 bg-dmat-red rounded-full"></span>
                  <span class="text-sm text-gray-700">カラー: <strong>${colorName}</strong></span>
                  ${colorVariant && colorVariant.priceDiff > 0 ? `<span class="text-xs text-gray-400">+${formatPrice(colorVariant.priceDiff)}</span>` : ''}
                </div>
                ${accNames.map(name => {
                  const acc = ACCESSORIES.find(a => a.name === name);
                  return `<div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-dmat-navy rounded-full"></span>
                    <span class="text-sm text-gray-700">${name}</span>
                    ${acc && acc.price > 0 ? `<span class="text-xs text-gray-400">+${formatPrice(acc.price)}</span>` : '<span class="text-xs text-green-600">無料</span>'}
                  </div>`;
                }).join('')}
              </div>
            </div>

            <p class="text-3xl font-bold text-dmat-red mb-1">${formatPrice(price)}</p>
            <p class="text-sm text-gray-400 mb-6">税込価格</p>

            <div class="flex items-center gap-3 mb-6">
              <label class="text-sm text-gray-600 font-medium">数量:</label>
              <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden">
                <button onclick="changeQuantity(-1)" class="px-3 py-2 text-gray-500 hover:bg-gray-100 transition-colors text-lg font-bold">&minus;</button>
                <input type="number" id="quantity" value="1" min="1" max="99" class="w-14 text-center border-x border-gray-200 py-2 text-sm font-medium" />
                <button onclick="changeQuantity(1)" class="px-3 py-2 text-gray-500 hover:bg-gray-100 transition-colors text-lg font-bold">&plus;</button>
              </div>
            </div>

            <div class="flex gap-3 mb-8">
              <button onclick="handleAddSetToCart('${set.id}')"
                      class="flex-1 bg-dmat-red text-white py-3.5 px-6 rounded-xl hover:bg-dmat-red-dark transition-all font-bold text-lg shadow-lg shadow-red-200">
                カートに入れる
              </button>
              <button onclick="handleBuyNowSet('${set.id}')"
                      class="flex-1 bg-dmat-navy text-white py-3.5 px-6 rounded-xl hover:bg-dmat-navy-light transition-all font-bold text-lg">
                今すぐ購入
              </button>
            </div>

            ${renderProductInfo()}
          </div>
        </div>

        ${renderRelatedSets(set.id)}
      `;
    }

    function renderCustomMode(container) {
      document.title = 'カスタム注文 - DMAT STORE';

      const colorOptions = COLOR_VARIANTS.map((c, i) => `
        <label class="builder-option block border-2 rounded-xl p-4 cursor-pointer transition-all ${i === 0 ? 'border-dmat-red ring-2 ring-dmat-red bg-red-50' : 'border-gray-200'}">
          <div class="flex items-center gap-3">
            <input type="radio" name="color" value="${c.id}" ${i === 0 ? 'checked' : ''} class="hidden" />
            <div class="w-10 h-10 rounded-lg bg-gray-100 overflow-hidden flex-shrink-0">
              <img src="${c.image}" alt="${c.name}" class="w-full h-full object-cover"
                   onerror="this.parentElement.innerHTML='<span class=\\'text-lg flex items-center justify-center h-full\\'>&#128273;</span>'" />
            </div>
            <div class="flex-1">
              <span class="font-medium text-gray-800 text-sm">${c.name}</span>
              <span class="text-xs text-gray-400 block">${c.priceDiff > 0 ? '+' + formatPrice(c.priceDiff) : '基本価格'}</span>
            </div>
          </div>
        </label>
      `).join('');

      const accOptions = ACCESSORIES.map(a => `
        <label class="builder-option block border-2 rounded-xl p-4 cursor-pointer transition-all ${a.isDefault ? 'border-dmat-navy ring-2 ring-dmat-navy bg-blue-50' : 'border-gray-200'}">
          <div class="flex items-center gap-3">
            <input type="checkbox" name="accessory" value="${a.id}" ${a.isDefault ? 'checked' : ''} class="hidden" />
            <div class="w-10 h-10 rounded-lg bg-gray-100 overflow-hidden flex-shrink-0 flex items-center justify-center">
              <img src="${a.image || 'images/' + a.id + '.webp'}" alt="${a.name}" class="w-full h-full object-cover"
                   onerror="this.parentElement.innerHTML='<span class=\\'text-lg\\'>&#128279;</span>'" />
            </div>
            <div class="flex-1">
              <span class="font-medium text-gray-800 text-sm">${a.name}</span>
              <span class="text-xs text-gray-400 block">${a.price > 0 ? '+' + formatPrice(a.price) : '無料'}</span>
            </div>
          </div>
        </label>
      `).join('');

      const defaultPrice = calculateItemPrice('standard-red', ACCESSORIES.filter(a => a.isDefault).map(a => a.id));

      container.innerHTML = `
        <nav class="text-sm text-gray-500 mb-6">
          <a href="index.html" class="hover:text-dmat-navy transition-colors">トップ</a>
          <span class="mx-2">&gt;</span>
          <span>カスタム注文</span>
        </nav>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
          <div>
            <div class="aspect-square bg-gray-50 rounded-2xl flex items-center justify-center overflow-hidden border border-gray-100 sticky top-24">
              <img id="builder-image" src="${COLOR_VARIANTS[0].image}" alt="${COLOR_VARIANTS[0].name}"
                   class="w-full h-full object-cover"
                   onerror="this.parentElement.innerHTML='<div class=\\'flex flex-col items-center justify-center h-full\\'><span class=\\'text-6xl mb-2\\'>&#128273;</span><span class=\\'text-gray-400\\'>DMAT キーホルダー</span></div>'" />
            </div>
          </div>
          <div>
            <span class="inline-block bg-dmat-navy text-white text-xs font-bold px-3 py-1 rounded-full mb-4">カスタム</span>
            <h1 class="text-2xl sm:text-3xl font-bold text-dmat-navy mb-2">${BASE_PRODUCT.name}</h1>
            <p class="text-gray-600 mb-6 leading-relaxed">${BASE_PRODUCT.description}</p>

            <!-- カラー選択 -->
            <div class="mb-6">
              <h3 class="text-sm font-bold text-dmat-navy mb-3">1. カラーを選択</h3>
              <div class="space-y-3">
                ${colorOptions}
              </div>
            </div>

            <!-- 付属品選択 -->
            <div class="mb-6">
              <h3 class="text-sm font-bold text-dmat-navy mb-3">2. 付属品を選択</h3>
              <div class="space-y-3">
                ${accOptions}
              </div>
            </div>

            <!-- 構成表示 -->
            <div class="bg-gray-50 rounded-xl p-4 mb-6">
              <p id="builder-desc" class="text-sm text-gray-600"></p>
            </div>

            <!-- 価格表示 -->
            <p id="builder-price" class="text-3xl font-bold text-dmat-red mb-1">${formatPrice(defaultPrice)}</p>
            <p class="text-sm text-gray-400 mb-6">税込価格</p>

            <!-- 数量 -->
            <div class="flex items-center gap-3 mb-6">
              <label class="text-sm text-gray-600 font-medium">数量:</label>
              <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden">
                <button onclick="changeQuantity(-1)" class="px-3 py-2 text-gray-500 hover:bg-gray-100 transition-colors text-lg font-bold">&minus;</button>
                <input type="number" id="quantity" value="1" min="1" max="99" class="w-14 text-center border-x border-gray-200 py-2 text-sm font-medium" />
                <button onclick="changeQuantity(1)" class="px-3 py-2 text-gray-500 hover:bg-gray-100 transition-colors text-lg font-bold">&plus;</button>
              </div>
            </div>

            <div class="flex gap-3 mb-8">
              <button onclick="handleAddCustomToCart()"
                      class="flex-1 bg-dmat-red text-white py-3.5 px-6 rounded-xl hover:bg-dmat-red-dark transition-all font-bold text-lg shadow-lg shadow-red-200">
                カートに入れる
              </button>
              <button onclick="handleBuyNowCustom()"
                      class="flex-1 bg-dmat-navy text-white py-3.5 px-6 rounded-xl hover:bg-dmat-navy-light transition-all font-bold text-lg">
                今すぐ購入
              </button>
            </div>

            ${renderProductInfo()}
          </div>
        </div>

        <!-- おすすめセットも表示 -->
        <section class="mt-16">
          <h2 class="text-xl font-bold text-dmat-navy mb-6">おすすめセット</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            ${RECOMMENDED_SETS.slice(0, 4).map(s => createSetCard(s)).join('')}
          </div>
        </section>
      `;

      // ビルダー初期化
      initBuilder();
    }

    function renderProductInfo() {
      return `
        <div class="space-y-4">
          <details class="bg-white border border-gray-100 rounded-xl overflow-hidden">
            <summary class="px-5 py-4 cursor-pointer text-sm font-bold text-dmat-navy hover:bg-gray-50 transition-colors">商品説明</summary>
            <div class="px-5 pb-4 text-sm text-gray-600 space-y-2">
              <p>DMAT（災害派遣医療チーム）の公式カラーを使用したキーホルダーです。</p>
              <p>3Dプリント技術により、精密な造形を実現。NFC チップ内蔵で、緊急連絡先やプロフィールを登録できます。</p>
            </div>
          </details>
          <details class="bg-white border border-gray-100 rounded-xl overflow-hidden">
            <summary class="px-5 py-4 cursor-pointer text-sm font-bold text-dmat-navy hover:bg-gray-50 transition-colors">利用シーン</summary>
            <div class="px-5 pb-4 text-sm text-gray-600 space-y-2">
              <ul class="list-disc list-inside space-y-1">
                <li>DMAT活動時の身分表示・チーム連帯感の向上</li>
                <li>災害拠点病院のスタッフ記念品として</li>
                <li>防災訓練・研修の記念グッズとして</li>
                <li>日常使いのキーホルダーとして</li>
              </ul>
            </div>
          </details>
          <details class="bg-white border border-gray-100 rounded-xl overflow-hidden">
            <summary class="px-5 py-4 cursor-pointer text-sm font-bold text-dmat-navy hover:bg-gray-50 transition-colors">サイズ・素材</summary>
            <div class="px-5 pb-4 text-sm text-gray-600 space-y-2">
              <ul class="list-disc list-inside space-y-1">
                <li>サイズ: 約 43mm x 50mm x 7mm</li>
                <li>素材: PLA樹脂（3Dプリント）</li>
                <li>NFC: NTAG215 内蔵</li>
                <li>重量: 約 25g</li>
              </ul>
            </div>
          </details>
          <details class="bg-white border border-gray-100 rounded-xl overflow-hidden">
            <summary class="px-5 py-4 cursor-pointer text-sm font-bold text-dmat-navy hover:bg-gray-50 transition-colors">配送・返品</summary>
            <div class="px-5 pb-4 text-sm text-gray-600 space-y-2">
              <ul class="list-disc list-inside space-y-1">
                <li>受注生産: ご注文確定後、10日以内に発送</li>
                <li>送料: 1~4個 &#165;185（クリックポスト）/ 5個以上 &#165;370（レターパック）</li>
                <li>全国一律・追跡あり</li>
                <li>受注生産品のためお客様都合による返品不可</li>
                <li>不良品・破損品は到着後7日以内に交換対応</li>
              </ul>
            </div>
          </details>
        </div>
      `;
    }

    function renderRelatedSets(currentSetId) {
      const related = RECOMMENDED_SETS.filter(s => s.id !== currentSetId).slice(0, 3);
      if (related.length === 0) return '';
      return `
        <section class="mt-16">
          <h2 class="text-xl font-bold text-dmat-navy mb-6">その他のセット</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            ${related.map(s => createSetCard(s)).join('')}
          </div>
        </section>
      `;
    }

    function handleAddSetToCart(setId) {
      const set = RECOMMENDED_SETS.find(s => s.id === setId);
      if (!set) return;
      const qty = parseInt(document.getElementById('quantity').value) || 1;
      addToCart(set.color, set.accessories, qty);
      showToast('カートに追加しました');
    }

    function handleBuyNowSet(setId) {
      const set = RECOMMENDED_SETS.find(s => s.id === setId);
      if (!set) return;
      const qty = parseInt(document.getElementById('quantity').value) || 1;
      addToCart(set.color, set.accessories, qty);
      window.location.href = 'cart.html';
    }

    function handleAddCustomToCart() {
      const colorId = document.querySelector('input[name="color"]:checked')?.value || 'standard-red';
      const accessoryIds = Array.from(document.querySelectorAll('input[name="accessory"]:checked')).map(el => el.value);
      const qty = parseInt(document.getElementById('quantity').value) || 1;
      addToCart(colorId, accessoryIds, qty);
      showToast('カートに追加しました');
    }

    function handleBuyNowCustom() {
      const colorId = document.querySelector('input[name="color"]:checked')?.value || 'standard-red';
      const accessoryIds = Array.from(document.querySelectorAll('input[name="accessory"]:checked')).map(el => el.value);
      const qty = parseInt(document.getElementById('quantity').value) || 1;
      addToCart(colorId, accessoryIds, qty);
      window.location.href = 'cart.html';
    }
  </script>
</body>
</html>
