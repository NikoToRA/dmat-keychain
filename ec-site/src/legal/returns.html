<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>返品・交換ポリシー - DMAT STORE</title>
  <meta property="og:title" content="DMAT STORE - DMAT隊員・病院向けグッズ" />
  <meta property="og:description" content="DMATロゴ入りキーホルダー。3Dプリント製、NFC内蔵。" />
  <meta property="og:image" content="../images/og-image.webp" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-50">
  <header id="site-header" class="bg-white shadow-sm sticky top-0 z-40"></header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <nav class="text-sm text-gray-500 mb-6">
      <a href="../index.html" class="hover:text-dmat-navy transition-colors">トップ</a>
      <span class="mx-2">&gt;</span>
      <span>返品・交換ポリシー</span>
    </nav>
    <h1 class="text-2xl font-bold text-dmat-navy mb-6">返品・交換ポリシー</h1>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sm:p-8 space-y-8">
      <section>
        <div class="flex items-center gap-3 mb-3">
          <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
          </div>
          <h2 class="font-bold text-lg text-dmat-navy">受注生産品について</h2>
        </div>
        <p class="text-gray-600 text-sm leading-relaxed pl-11">
          当店の商品は受注生産品です。お客様のご都合による返品・交換は承っておりません。
          ご注文前に商品内容をよくご確認ください。
        </p>
      </section>

      <section>
        <div class="flex items-center gap-3 mb-3">
          <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          </div>
          <h2 class="font-bold text-lg text-dmat-navy">不良品・破損品の場合</h2>
        </div>
        <div class="pl-11">
          <p class="text-gray-600 text-sm leading-relaxed mb-3">
            商品到着後<strong class="text-dmat-navy">7日以内</strong>にご連絡いただいた場合、交換対応いたします。
            以下の情報とともにご連絡ください。
          </p>
          <ul class="text-gray-600 text-sm space-y-2">
            <li class="flex items-start gap-2">
              <span class="w-1.5 h-1.5 bg-dmat-navy rounded-full mt-1.5 flex-shrink-0"></span>
              注文番号
            </li>
            <li class="flex items-start gap-2">
              <span class="w-1.5 h-1.5 bg-dmat-navy rounded-full mt-1.5 flex-shrink-0"></span>
              不良・破損の状態がわかる写真
            </li>
            <li class="flex items-start gap-2">
              <span class="w-1.5 h-1.5 bg-dmat-navy rounded-full mt-1.5 flex-shrink-0"></span>
              お名前・ご連絡先
            </li>
          </ul>
          <div class="mt-4 bg-blue-50 rounded-lg p-4">
            <p class="text-sm text-dmat-navy font-medium">
              連絡先: <a href="mailto:support@wonder-drill.com" class="underline">support@wonder-drill.com</a>
            </p>
          </div>
        </div>
      </section>

      <section>
        <div class="flex items-center gap-3 mb-3">
          <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </div>
          <h2 class="font-bold text-lg text-dmat-navy">交換の流れ</h2>
        </div>
        <div class="pl-11 space-y-3">
          <div class="flex gap-3">
            <span class="w-6 h-6 bg-dmat-navy rounded-full flex items-center justify-center flex-shrink-0">
              <span class="text-white text-xs font-bold">1</span>
            </span>
            <p class="text-gray-600 text-sm">メールにてご連絡</p>
          </div>
          <div class="flex gap-3">
            <span class="w-6 h-6 bg-dmat-navy rounded-full flex items-center justify-center flex-shrink-0">
              <span class="text-white text-xs font-bold">2</span>
            </span>
            <p class="text-gray-600 text-sm">当店にて確認後、交換品を発送</p>
          </div>
          <div class="flex gap-3">
            <span class="w-6 h-6 bg-dmat-navy rounded-full flex items-center justify-center flex-shrink-0">
              <span class="text-white text-xs font-bold">3</span>
            </span>
            <p class="text-gray-600 text-sm">不良品は着払いにてご返送</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer id="site-footer" class="bg-gray-900 text-gray-300"></footer>

  <script src="../js/products.js"></script>
  <script src="../js/shipping.js"></script>
  <script src="../js/cart.js"></script>
