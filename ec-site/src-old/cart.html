<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カート - DMAT STORE</title>
  <meta property="og:title" content="DMAT STORE - DMAT隊員・病院向けグッズ" />
  <meta property="og:description" content="DMATロゴ入りキーホルダー。3Dプリント製、NFC内蔵。" />
  <meta property="og:image" content="images/og-image.webp" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/analytics-config.js"></script>
  <script src="js/analytics.js" defer></script>
</head>
<body class="bg-white">
  <header id="site-header" class="bg-white sticky top-0 z-40 transition-shadow duration-300"></header>

  <main class="max-w-4xl mx-auto px-6 py-10">
    <nav class="text-xs text-gray-400 mb-8 font-light">
      <a href="index.html" class="hover:text-dmat-navy transition-colors">トップ</a>
      <span class="mx-2 text-gray-300">/</span>
      <span class="text-gray-600">カート</span>
    </nav>
    <h1 class="text-2xl font-bold text-dmat-navy mb-8 tracking-tight">ショッピングカート</h1>
    <div id="cart-content"></div>
  </main>

  <footer id="site-footer" class="bg-gray-900 text-gray-300"></footer>

  <script src="js/products.js"></script>
  <script src="js/shipping.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui.js"></script>
  <script>
    function renderCart() {
      const container = document.getElementById('cart-content');
      const cartData = getCartTotal();

      if (cartData.items.length === 0) {
        container.innerHTML = `
          <div class="text-center py-24">
            <div class="w-20 h-20 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
              <svg class="w-10 h-10 text-gray-200" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
              </svg>
            </div>
            <p class="text-gray-500 mb-2 text-base font-medium">カートに商品がありません</p>
            <p class="text-gray-300 text-xs mb-8 font-light">お気に入りの商品を見つけてください</p>
            <a href="index.html" class="inline-block bg-dmat-red text-white py-3 px-8 rounded-lg hover:bg-dmat-red-dark transition-all font-medium text-sm tracking-wide hover:shadow-lg hover:shadow-red-100">
              商品を見る
            </a>
          </div>
        `;
        return;
      }

      const itemsHtml = cartData.items.map(item => {
        const colorVariant = COLOR_VARIANTS.find(c => c.id === item.colorId);
        const image = colorVariant ? colorVariant.image : BASE_PRODUCT.image;
        return `
        <div class="flex items-start gap-5 py-6 border-b border-gray-100 last:border-0">
          <div class="w-20 h-20 bg-gray-50 rounded-xl flex items-center justify-center flex-shrink-0 overflow-hidden">
            <img src="${image}" alt="${item.description}" class="w-full h-full object-cover"
                 onerror="this.parentElement.innerHTML='<svg class=\\'w-8 h-8 text-gray-200\\' fill=\\'none\\' stroke=\\'currentColor\\' viewBox=\\'0 0 24 24\\'><path stroke-linecap=\\'round\\' stroke-linejoin=\\'round\\' stroke-width=\\'1\\' d=\\'M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z\\'/></svg>'" />
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="font-medium text-dmat-navy text-sm">${item.description}</h3>
            <p class="text-xs text-gray-300 mt-1">${formatPrice(item.unitPrice)} / 個</p>
          </div>
          <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden flex-shrink-0">
            <button onclick="handleQuantityChange('${item.id}', ${item.quantity - 1})" class="px-2.5 py-2 text-gray-400 hover:bg-gray-50 transition-colors text-sm">&minus;</button>
            <span class="px-3 py-2 text-sm font-medium min-w-[2rem] text-center">${item.quantity}</span>
            <button onclick="handleQuantityChange('${item.id}', ${item.quantity + 1})" class="px-2.5 py-2 text-gray-400 hover:bg-gray-50 transition-colors text-sm">&plus;</button>
          </div>
          <div class="text-right flex-shrink-0 w-20">
            <p class="font-semibold text-dmat-navy text-sm">${formatPrice(item.unitPrice * item.quantity)}</p>
          </div>
          <button onclick="handleRemove('${item.id}')" class="text-gray-200 hover:text-red-400 transition-colors flex-shrink-0 p-1" title="削除">
            <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
      `}).join('');

      const shippingNote = cartData.totalQuantity < 5
        ? '<span class="text-[10px] text-blue-500">5個以上で送料&#165;370に</span>'
        : '';

      container.innerHTML = `
        <div class="bg-gray-50 rounded-2xl p-6 sm:p-8">
          ${itemsHtml}
        </div>
        <div class="bg-gray-50 rounded-2xl p-6 sm:p-8 mt-4">
          <div class="space-y-3 text-sm">
            <div class="flex justify-between items-center">
              <span class="text-gray-400 text-xs">小計（${cartData.totalQuantity}点）</span>
              <span class="font-medium text-sm">${formatPrice(cartData.subtotal)}</span>
            </div>
            <div class="flex justify-between items-center">
              <span class="text-gray-400 text-xs">送料（${cartData.shipping.method || '-'}）${shippingNote}</span>
              <span class="font-medium text-sm">${formatPrice(cartData.shipping.price)}</span>
            </div>
            <div class="flex justify-between text-lg font-bold border-t border-gray-200 pt-4 mt-4">
              <span class="text-dmat-navy">合計（税込）</span>
              <span class="text-dmat-navy">${formatPrice(cartData.total)}</span>
            </div>
          </div>
          <a href="confirm.html"
             class="block mt-8 w-full bg-dmat-red text-white py-4 px-6 rounded-lg hover:bg-dmat-red-dark transition-all font-semibold text-center text-sm tracking-wide hover:shadow-lg hover:shadow-red-100">
            まとめて購入する
          </a>
          <a href="index.html" class="block mt-4 text-center text-xs text-gray-300 hover:text-dmat-navy transition-colors">買い物を続ける</a>
        </div>
      `;
    }

    function handleQuantityChange(itemId, newQty) {
      updateQuantity(itemId, newQty);
      renderCart();
    }

    function handleRemove(itemId) {
      removeFromCart(itemId);
      renderCart();
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
